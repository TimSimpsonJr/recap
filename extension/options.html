<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recap — Meeting URL Patterns</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #151921;
      color: #d4dae3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px 32px;
      min-width: 480px;
    }
    h2 {
      color: #C4A84D;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .subtitle {
      color: #7a8493;
      font-size: 13px;
      margin-bottom: 20px;
    }
    #patterns {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    .pattern-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .pattern-row input {
      flex: 1;
      background: #1c2128;
      border: 1px solid #363d47;
      color: #d4dae3;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
    }
    .pattern-row input:focus {
      outline: none;
      border-color: #C4A84D;
    }
    .pattern-row select {
      background: #1c2128;
      border: 1px solid #363d47;
      color: #d4dae3;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
    }
    .pattern-row select:focus {
      outline: none;
      border-color: #C4A84D;
    }
    .remove-btn {
      background: transparent;
      border: 1px solid #363d47;
      color: #7a8493;
      cursor: pointer;
      font-size: 16px;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .remove-btn:hover {
      color: #e55;
      border-color: #e55;
    }
    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 16px;
    }
    button {
      padding: 7px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    #add-btn {
      background: #4baa55;
      color: #fff;
      margin-bottom: 8px;
    }
    #add-btn:hover { background: #3d9447; }
    #save-btn {
      background: #C4A84D;
      color: #151921;
    }
    #save-btn:hover { background: #b3993f; }
    #reset-btn {
      background: #1c2128;
      border: 1px solid #363d47;
      color: #d4dae3;
    }
    #reset-btn:hover { background: #252c36; }
    #saved-msg {
      color: #4baa55;
      font-size: 13px;
      margin-left: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #saved-msg.visible { opacity: 1; }
    #auth-section {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid #252c36;
    }
    #auth-section h2 { margin-bottom: 12px; }
    .form-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .form-row label {
      color: #7a8493;
      font-size: 13px;
      min-width: 100px;
    }
    .form-row input[type="text"] {
      flex: 1;
      background: #1c2128;
      border: 1px solid #363d47;
      color: #d4dae3;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
    }
    .form-row input[type="text"]:focus {
      outline: none;
      border-color: #C4A84D;
    }
    #save-url-btn {
      background: #1c2128;
      border: 1px solid #363d47;
      color: #d4dae3;
    }
    #save-url-btn:hover { background: #252c36; }
    #connect-btn {
      background: #4baa55;
      color: #fff;
    }
    #connect-btn:hover { background: #3d9447; }
    #disconnect-btn {
      background: #1c2128;
      border: 1px solid #363d47;
      color: #d4dae3;
    }
    #disconnect-btn:hover {
      color: #e55;
      border-color: #e55;
    }
    .error-msg {
      color: #e55;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .status-msg {
      font-size: 13px;
      margin-top: 8px;
    }
    .status-msg[data-variant="ok"] { color: #4baa55; }
    .status-msg[data-variant="error"] { color: #e55; }
    .status-msg[data-variant="warning"] { color: #C4A84D; }
    .status-msg[data-variant="neutral"] { color: #7a8493; }
  </style>
</head>
<body>
  <section id="auth-section">
    <h2>Daemon connection</h2>
    <div class="form-row">
      <label for="base-url-input">Daemon URL:</label>
      <input type="text" id="base-url-input" placeholder="http://localhost:9847" />
    </div>
    <p id="base-url-error" class="error-msg" hidden></p>
    <div class="form-row">
      <button id="save-url-btn">Save URL</button>
      <button id="connect-btn">Connect</button>
      <button id="disconnect-btn" hidden>Disconnect</button>
    </div>
    <p id="auth-status" class="status-msg">Not paired.</p>
  </section>
  <h2>Meeting URL Patterns</h2>
  <p class="subtitle">Configure which URLs trigger meeting detection. Each pattern is matched against the page URL.</p>
  <div id="patterns"></div>
  <button id="add-btn">Add pattern</button>
  <div class="actions">
    <button id="save-btn">Save</button>
    <button id="reset-btn">Reset to defaults</button>
    <span id="saved-msg">Saved!</span>
  </div>
  <script src="options.js"></script>
</body>
</html>
